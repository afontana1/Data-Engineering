  ############################################
  # Lambda: Job API (4 handlers)
  ############################################
  JobApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-jobapi"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: JobApiAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem]
                Resource: !GetAtt DocumentJobsTable.Arn
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource:
                  - !Sub "${RawBucket.Arn}/*"
                  - !Sub "${ParsedBucket.Arn}/*"
              - Effect: Allow
                Action: [states:StartExecution]
                Resource: !Ref OrchestratorStateMachine

  CreateJobFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-create-job"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt JobApiLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          FRONTEND_ORIGIN: !Ref FrontendOrigin
          RAW_BUCKET: !Ref RawBucket
          PARSED_BUCKET: !Ref ParsedBucket
          JOBS_TABLE: !Ref DocumentJobsTable
          PRESIGN_EXPIRY: !Ref PresignUrlExpirySeconds
          TTL_DAYS: !Ref JobTtlDays
      Code:
        ZipFile: |
          import json, os, time, uuid
          import boto3

          ddb = boto3.client("dynamodb")
          s3 = boto3.client("s3")

          RAW_BUCKET = os.environ["RAW_BUCKET"]
          JOBS_TABLE = os.environ["JOBS_TABLE"]
          PRESIGN_EXPIRY = int(os.environ.get("PRESIGN_EXPIRY","3600"))
          TTL_DAYS = int(os.environ.get("TTL_DAYS","30"))

          def _resp(code, body, headers=None):
              h = {"Content-Type":"application/json", "Access-Control-Allow-Origin":os.environ.get("FRONTEND_ORIGIN","*")}
              if headers: h.update(headers)
              return {"statusCode": code, "headers": h, "body": json.dumps(body)}

          def handler(event, context):
              try:
                  body = json.loads(event.get("body") or "{}")
                  tenant_id = body["tenantId"]
                  filename = body["filename"]
                  content_type = body.get("contentType","application/pdf")

                  job_id = str(uuid.uuid4())
                  key = f"{tenant_id}/{job_id}/input/{filename}"
                  now = int(time.time())
                  ttl = now + TTL_DAYS*24*3600

                  upload_url = s3.generate_presigned_url(
                      ClientMethod="put_object",
                      Params={"Bucket": RAW_BUCKET, "Key": key, "ContentType": content_type},
                      ExpiresIn=PRESIGN_EXPIRY
                  )

                  ddb.put_item(
                      TableName=JOBS_TABLE,
                      Item={
                          "jobId": {"S": job_id},
                          "tenantId": {"S": tenant_id},
                          "status": {"S": "UPLOADING"},
                          "inputBucket": {"S": RAW_BUCKET},
                          "inputKey": {"S": key},
                          "filename": {"S": filename},
                          "contentType": {"S": content_type},
                          "createdAt": {"S": __import__("datetime").datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")},
                          "updatedAt": {"S": __import__("datetime").datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")},
                          "ttlEpochSeconds": {"N": str(ttl)}
                      }
                  )

                  return _resp(201, {
                      "jobId": job_id,
                      "status": "UPLOADING",
                      "upload": {
                          "method": "PUT",
                          "url": upload_url,
                          "headers": {"Content-Type": content_type},
                          "expiresInSeconds": PRESIGN_EXPIRY,
                          "s3": {"bucket": RAW_BUCKET, "key": key}
                      },
                      "links": {
                          "start": f"/jobs/{job_id}/start",
                          "status": f"/jobs/{job_id}",
                          "result": f"/jobs/{job_id}/result"
                      }
                  })
              except KeyError as e:
                  return _resp(400, {"error":"BAD_REQUEST", "message": f"Missing field: {e}"})
              except Exception as e:
                  return _resp(500, {"error":"INTERNAL", "message": str(e)})

  StartJobFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-start-job"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt JobApiLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          FRONTEND_ORIGIN: !Ref FrontendOrigin
          JOBS_TABLE: !Ref DocumentJobsTable
          STATE_MACHINE_ARN: !Ref OrchestratorStateMachine
      Code:
        ZipFile: |
          import json, os, time
          import boto3

          ddb = boto3.client("dynamodb")
          s3 = boto3.client("s3")
          sfn = boto3.client("stepfunctions")

          JOBS_TABLE = os.environ["JOBS_TABLE"]
          SM_ARN = os.environ["STATE_MACHINE_ARN"]

          def _resp(code, body):
              return {"statusCode": code, "headers": {"Content-Type":"application/json","Access-Control-Allow-Origin":os.environ.get("FRONTEND_ORIGIN","*")}, "body": json.dumps(body)}

          def handler(event, context):
              try:
                  job_id = event["pathParameters"]["jobId"]
                  now = int(time.time())

                  item = ddb.get_item(TableName=JOBS_TABLE, Key={"jobId":{"S":job_id}}).get("Item")
                  if not item:
                      return _resp(404, {"error":"NOT_FOUND","message":"job not found"})

                  status = item.get("status",{}).get("S","")
                  if status in ("STARTED","SPLITTING","TEXTRACT_RUNNING","POSTPROCESSING","SUCCEEDED"):
                      return _resp(202, {"jobId": job_id, "status": status, "message":"already started", "links":{"status":f"/jobs/{job_id}","result":f"/jobs/{job_id}/result"}})
                  if status == "FAILED":
                      return _resp(409, {"error":"CONFLICT","message":"job already failed; create a new job"})

                  bucket = item["inputBucket"]["S"]
                  key = item["inputKey"]["S"]

                  # Determine size (input.bytes) to drive split decision
                  head = s3.head_object(Bucket=bucket, Key=key)
                  bytes_ = int(head["ContentLength"])

                  tenant_id = item["tenantId"]["S"]

                  # Mark SUBMITTED
                  ddb.update_item(
                      TableName=JOBS_TABLE,
                      Key={"jobId":{"S":job_id}},
                      UpdateExpression="SET #s=:s, updatedAt=:u, inputBytes=:b",
                      ExpressionAttributeNames={"#s":"status"},
                      ExpressionAttributeValues={
                          ":s":{"S":"SUBMITTED"},
                          ":u":{"S": __import__("datetime").datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")},
                          ":b":{"N":str(bytes_)}
                      }
                  )

                  execution_input = {
                      "jobId": job_id,
                      "tenantId": tenant_id,
                      "input": {"bucket": bucket, "key": key, "bytes": bytes_},
                      "options": {"storeTextractRaw": True}
                  }

                  sfn.start_execution(
                      stateMachineArn=SM_ARN,
                      name=f"{job_id}-{now}",
                      input=json.dumps(execution_input)
                  )

                  return _resp(202, {"jobId": job_id, "status":"SUBMITTED", "links":{"status":f"/jobs/{job_id}","result":f"/jobs/{job_id}/result"}})
              except Exception as e:
                  return _resp(500, {"error":"INTERNAL","message": str(e)})

  GetJobStatusFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-get-job"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt JobApiLambdaRole.Arn
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          FRONTEND_ORIGIN: !Ref FrontendOrigin
          JOBS_TABLE: !Ref DocumentJobsTable
      Code:
        ZipFile: |
          import json, os
          import boto3

          ddb = boto3.client("dynamodb")
          JOBS_TABLE = os.environ["JOBS_TABLE"]

          def _resp(code, body, extra_headers=None):
              h = {"Content-Type":"application/json","Access-Control-Allow-Origin":os.environ.get("FRONTEND_ORIGIN","*")}
              if extra_headers: h.update(extra_headers)
              return {"statusCode": code, "headers": h, "body": json.dumps(body)}

          def handler(event, context):
              job_id = event["pathParameters"]["jobId"]
              item = ddb.get_item(TableName=JOBS_TABLE, Key={"jobId":{"S":job_id}}).get("Item")
              if not item:
                  return _resp(404, {"error":"NOT_FOUND","message":"job not found"})

              def gS(k): return item.get(k,{}).get("S")
              def gN(k):
                  v = item.get(k,{}).get("N")
                  return int(v) if v else None

              out = {
                  "jobId": gS("jobId"),
                  "tenantId": gS("tenantId"),
                  "status": gS("status"),
                  "createdAt": gS("createdAt"),
                  "updatedAt": gS("updatedAt"),
                  "input": {
                      "bucket": gS("inputBucket"),
                      "key": gS("inputKey"),
                      "bytes": gN("inputBytes"),
                      "filename": gS("filename"),
                      "contentType": gS("contentType")
                  },
                  "progress": {
                      "partsTotal": gN("partsTotal"),
                      "partsDone": gN("partsDone")
                  },
                  "output": {
                      "bucket": gS("outputBucket"),
                      "key": gS("outputKey")
                  },
                  "errorMessage": gS("errorMessage"),
                  "links": {
                      "result": f"/jobs/{job_id}/result"
                  }
              }
              return _resp(200, out)

  GetJobResultFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-get-result"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt JobApiLambdaRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          FRONTEND_ORIGIN: !Ref FrontendOrigin
          JOBS_TABLE: !Ref DocumentJobsTable
          PRESIGN_EXPIRY: !Ref PresignUrlExpirySeconds
      Code:
        ZipFile: |
          import json, os
          import boto3

          ddb = boto3.client("dynamodb")
          s3 = boto3.client("s3")

          JOBS_TABLE = os.environ["JOBS_TABLE"]
          PRESIGN_EXPIRY = int(os.environ.get("PRESIGN_EXPIRY","3600"))

          def _resp(code, body, extra_headers=None):
              h = {"Content-Type":"application/json","Access-Control-Allow-Origin":os.environ.get("FRONTEND_ORIGIN","*")}
              if extra_headers: h.update(extra_headers)
              return {"statusCode": code, "headers": h, "body": json.dumps(body)}

          def handler(event, context):
              job_id = event["pathParameters"]["jobId"]
              item = ddb.get_item(TableName=JOBS_TABLE, Key={"jobId":{"S":job_id}}).get("Item")
              if not item:
                  return _resp(404, {"error":"NOT_FOUND","message":"job not found"})

              status = item.get("status",{}).get("S","")
              if status != "SUCCEEDED":
                  # Hint the client how long to wait (simple backoff)
                  retry = 2 if status in ("SUBMITTED","STARTED","SPLITTING","TEXTRACT_RUNNING") else 5
                  return _resp(202, {"jobId": job_id, "status": status, "retryAfterSeconds": retry})

              bucket = item.get("outputBucket",{}).get("S")
              key = item.get("outputKey",{}).get("S")
              if not bucket or not key:
                  return _resp(500, {"error":"INTERNAL","message":"missing output pointer"})

              url = s3.generate_presigned_url(
                  ClientMethod="get_object",
                  Params={"Bucket": bucket, "Key": key},
                  ExpiresIn=PRESIGN_EXPIRY
              )
              return _resp(200, {"jobId": job_id, "status":"SUCCEEDED", "downloadUrl": url, "expiresInSeconds": PRESIGN_EXPIRY})

